services:
  il2server:
    build: .
    container_name: il2-gb-server
    restart: unless-stopped

    # Host networking: container shares the host's network stack directly.
    # This makes DServer bind to the real LAN IP (e.g. 192.168.x.x) so that
    # router port-forwarding and the master-server IP advertisement both work
    # correctly — identical to running Wine directly on the host.
    network_mode: host

    volumes:
      # Mount your IL-2 dedicated server files here.
      # The container expects:
      #   /il2/bin/game/DServer.exe
      #   /il2/data/server.sds          ← your SDS config file
      #   /il2/data/Multiplayer/Dogfight/*.Mission
      #   /il2/data/Multiplayer/Cooperative/*.Mission
      - ./il2-data:/il2

      # Web app mounted live — template and code changes on the host are
      # picked up immediately without rebuilding the image.
      - ./web:/web

    environment:
      # Path inside the container where IL-2 is mounted
      - IL2_PATH=/il2

      # Full path to the .sds file inside the container
      - SDS_PATH=/il2/data/server.sds

      # Set to "true" to start DServer.exe automatically on container start
      - AUTO_START=false

      # Web interface credentials
      - WEB_USER=admin
      - WEB_PASS=changeme

    # Needed for Wine + Xvfb to work correctly inside Docker
    shm_size: 256mb

